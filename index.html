<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="Lux&Lov - Premium online fashion, jewelry, and accessories store. Shop the latest trends with secure checkout and fast shipping.">
  <meta name="keywords" content="fashion, clothing, jewelry, accessories, online shopping, women's fashion, men's fashion, luxury items">
  <meta name="author" content="Lux&Lov">
  <meta name="robots" content="index, follow">
  <meta name="language" content="English">
  <meta name="revisit-after" content="7 days">
  
  <!-- Open Graph Tags for Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://luxandlov.com">
  <meta property="og:title" content="Lux&Lov - Premium Fashion & Jewelry">
  <meta property="og:description" content="Shop premium fashion, jewelry, and accessories. New collections daily with secure checkout and fast shipping.">
  <meta property="og:image" content="images/og-image.jpg">
  <meta property="og:site_name" content="Lux&Lov">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lux&Lov - Premium Fashion & Jewelry">
  <meta name="twitter:description" content="Shop premium fashion, jewelry, and accessories with secure checkout and fast shipping.">
  <meta name="twitter:image" content="images/og-image.jpg">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://luxandlov.com">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  
  <!-- Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Lux&Lov",
    "url": "https://luxandlov.com",
    "logo": "https://luxandlov.com/images/logo.png",
    "description": "Premium online shopping for fashion, jewelry, and accessories",
    "sameAs": [
      "https://www.facebook.com/luxandlov",
      "https://www.instagram.com/luxandlov",
      "https://www.twitter.com/luxandlov"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Service",
      "email": "support@luxandlov.com"
    }
  }
  </script>
  
  <title>Lux&Lov - Premium Fashion, Jewelry & Accessories Online</title>

          <a class="nav-link dropdown-toggle" href="#" id="womenDropdown">
            Women
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="pages/collection.html?category=women-dresses">Dresses</a></li>
            <li><a class="dropdown-item" href="pages/collection.html?category=women-jewellery">Jewellery</a></li>
            <li><a class="dropdown-item" href="pages/collection.html?category=women-shoes">Shoes</a></li>
            <li><a class="dropdown-item" href="pages/collection.html?category=women-bags">Bags</a></li>
          </ul>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="menDropdown">
            Men
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="pages/collection.html?category=men-clothes">Clothes</a></li>
            <li><a class="dropdown-item" href="pages/collection.html?category=men-shoes">Shoes</a></li>

            <li><a class="dropdown-item" href="pages/collection.html?category=men-belts">Belts</a></li>
          </ul>
        </li>
      </ul>

      <form class="d-flex me-3" id="search-form">
        <input class="form-control me-2" type="search" placeholder="Search" id="search-input">

      </form>

      <!-- Cart -->
      <a href="pages/cart.html" class="btn btn-outline-dark position-relative" aria-label="Shopping cart" title="View shopping cart">
        <i class="fas fa-shopping-cart" aria-hidden="true"></i>
        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" aria-live="polite">0</span>
      </a>
    </div>
  </div>
</nav>
