<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure checkout at Lux&Lov. Enter your shipping and payment information to complete your order. 100% secure transactions.">
  <meta name="robots" content="noindex, follow">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Checkout - Lux&Lov">
  <meta property="og:description" content="Complete your secure purchase at Lux&Lov">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://luxandlov.com/checkout.html">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">

  <!-- Payment Security Badge -->
  <meta name="payment-methods" content="credit-card">

  <title>Secure Checkout - Lux&Lov Premium Fashion</title>
</head>

<body>
  <div style="padding-top: 76px;"> <!-- Added padding to prevent content from being hidden by the fixed header -->
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lux&Lov</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#">Women</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="collection.html?category=women-dresses">Dresses</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-jewellery">Jewellery</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-shoes">Shoes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-bags">Bags</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#">Men</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="collection.html?category=men-clothes">Clothes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-shoes">Shoes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-watches">Watches</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-belts">Belts</a></li>
            </ul>
          </li>
        </ul>

        <form class="d-flex me-3">
          <input class="form-control me-2" type="search" placeholder="Search">
          <button class="btn btn-outline-dark" type="submit">Search</button>
        </form>

        <a href="cart.html" class="btn btn-outline-dark position-relative">
          <i class="fas fa-shopping-cart"></i>
          Cart 🛒 (<span id="cart-count">0</span>)
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <h1 class="mb-4">Checkout</h1>
    <section class="row">
      <!-- Shipping Form -->
      <div class="col-md-7">
        <form id="checkout-form" class="needs-validation">
          <fieldset>
            <legend class="h4 mb-3">Shipping Information</legend>
            <div class="form-group mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" id="name" name="name" class="form-control" required minlength="3">
            </div>
            <div class="form-group mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group mb-3">
              <label for="address" class="form-label">Street Address</label>
              <input type="text" id="address" name="address" class="form-control" required minlength="5">
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label for="city" class="form-label">City</label>
                  <input type="text" id="city" name="city" class="form-control" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label for="postal" class="form-label">Postal Code</label>
                  <input type="text" id="postal" name="postal" class="form-control" required>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="mt-4">
            <legend class="h4 mb-3">Payment Information</legend>
            <div class="form-group mb-3">
              <label for="card" class="form-label">Card Number</label>
              <input type="text" id="card" name="card" class="form-control" placeholder="1234 5678 9012 3456" required maxlength="19">
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label for="expiry" class="form-label">Expiry Date (MM/YY)</label>
                  <input type="text" id="expiry" name="expiry" class="form-control" placeholder="MM/YY" pattern="\d{2}/\d{2}" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label for="cvv" class="form-label">CVV</label>
                  <input type="text" id="cvv" name="cvv" class="form-control" placeholder="123" pattern="\d{3,4}" required maxlength="4">
                </div>
              </div>
            </div>
          </fieldset>

          <button type="submit" class="btn btn-success btn-lg mt-4 w-100">Place Order</button>
        </form>
      </div>

      <!-- Order Summary -->
      <aside class="col-md-5">
        <h2>Order Summary</h2>
        <ul id="order-summary" class="list-group mb-3" aria-live="polite"></ul>
        <h3>Total: $<span id="summary-total">0.00</span></h3>
      </aside>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg text-light text-center p-4 mt-5" role="contentinfo">
    <div class="mb-3">
      <a href="#" class="text-light me-3"><i class="fab fa-facebook fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-instagram fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-twitter fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-youtube fa-lg"></i></a>
      <a href="#" class="text-light"><i class="fab fa-linkedin fa-lg"></i></a>
    </div>
    <p class="mb-0">&copy; 2025 Lux&Lov. All Rights Reserved.</p>
  </footer>

  <script src="../js/form-validator.js"></script>
  <script src="../js/checkout.js"></script>
  <script src="../js/cart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</body>

</html>
