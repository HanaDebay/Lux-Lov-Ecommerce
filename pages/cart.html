<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Review and manage your shopping cart at Lux&Lov. View product details, update quantities, and proceed to checkout.">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shopping Cart - Lux&Lov">
  <meta property="og:description" content="Manage your shopping cart and proceed to secure checkout">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://luxandlov.com/pages/cart.html">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">

  <title>Shopping Cart - Lux&Lov Premium Fashion</title>
</head>

<body>
  <div style="padding-top: 76px;"> <!-- Added padding to prevent content from being hidden by the fixed header -->
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">Lux&Lov</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#">Women</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="collection.html?category=women-dresses">Dresses</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-jewellery">Jewellery</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-shoes">Shoes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=women-bags">Bags</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#">Men</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="collection.html?category=men-clothes">Clothes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-shoes">Shoes</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-watches">Watches</a></li>
              <li><a class="dropdown-item" href="collection.html?category=men-belts">Belts</a></li>
            </ul>
          </li>
        </ul>

        <form class="d-flex me-3" id="search-form">
          <input class="form-control me-2" type="search" placeholder="Search" id="search-input">
          <button class="btn btn-outline-dark" type="submit">Search</button>
        </form>

        <a href="cart.html" class="btn btn-outline-dark position-relative">
      <i class="fas fa-shopping-cart"></i>
      <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
    </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <h1 class="mb-4">Your Shopping Cart</h1>
    <section id="cart-items" aria-live="polite" aria-label="Cart items list"></section>

    <section class="text-end mt-4" aria-labelledby="cart-summary">
      <h2 id="cart-summary">Total: $<span id="cart-total">0.00</span></h2>
      <a href="checkout.html" class="btn btn-success mt-3" role="button">Proceed to Checkout</a>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg text-light text-center p-4 mt-5" role="contentinfo">
    <div class="mb-3">
      <a href="#" class="text-light me-3"><i class="fab fa-facebook fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-instagram fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-twitter fa-lg"></i></a>
      <a href="#" class="text-light me-3"><i class="fab fa-youtube fa-lg"></i></a>
      <a href="#" class="text-light"><i class="fab fa-linkedin fa-lg"></i></a>
    </div>
    <p class="mb-0">&copy; 2025 Lux&Lov. All Rights Reserved.</p>
  </footer>
  <script src="../js/search.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/cart-page.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</body>

</html>
